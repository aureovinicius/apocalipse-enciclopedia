<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparar Tradições — Apocalipse</title>
  <meta name="description" content="Panorama do perfil hermenêutico de cada tradição numa tabela comparativa.">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/print.css">
</head>
<body>
  <header id="site-header"></header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow">Panorama</p>
          <h2>Comparar Tradições</h2>
          <p>O perfil hermenêutico de cada tradição em cinco eixos — preterista, historicista, futurista, idealista e dispensacionalista — lado a lado numa tabela comparativa.</p>
        </div>

        <div class="section-head">
          <h3>Tabela das tendências</h3>
          <p class="muted">Pontuação de 0 a 5 em cada eixo. Clique nos títulos para ordenar.</p>
        </div>
        <div id="table-mount"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="data/methods.js"></script>
  <script src="data/traditions.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    (function () {
      var APOC = window.APOC, el = APOC.ui.el;
      var trads = APOC.traditions, methods = APOC.methods;

      // Tabela comparativa global
      var dominant = function (t) {
        var best = null, bv = -1;
        methods.forEach(function (m) { var v = (t.scores && t.scores[m.id]) || 0; if (v > bv) { bv = v; best = m; } });
        return best;
      };
      var headers = [['name', 'Tradição'], ['family', 'Família']].concat(methods.map(function (m) { return [m.id, m.name]; })).concat([['dom', 'Predominante']]);
      var rows = trads.map(function (t) {
        var r = { name: t.name, family: t.family, dom: dominant(t).name, domColor: dominant(t).color };
        methods.forEach(function (m) { r[m.id] = (t.scores && t.scores[m.id]) || 0; });
        return r;
      });
      var sortState = { key: null, dir: 1 };
      var tbody = el('tbody');
      function draw() {
        tbody.innerHTML = '';
        var data = rows.slice();
        if (sortState.key) data.sort(function (a, b) {
          var x = a[sortState.key], y = b[sortState.key];
          return (typeof x === 'number' ? x - y : String(x).localeCompare(String(y))) * sortState.dir;
        });
        data.forEach(function (r) {
          var tds = [el('td', { class: 'trad', text: r.name }), el('td', { text: r.family })];
          methods.forEach(function (m) { tds.push(el('td', { text: String(r[m.id]) })); });
          tds.push(el('td', {}, [el('span', { class: 'badge', style: 'background:' + r.domColor, text: r.dom })]));
          tbody.appendChild(el('tr', {}, tds));
        });
      }
      var thead = el('thead', {}, [el('tr', {}, headers.map(function (h) {
        return el('th', { onclick: function () { if (sortState.key === h[0]) sortState.dir *= -1; else { sortState.key = h[0]; sortState.dir = 1; } draw(); }, html: h[1] + ' <span class="muted">&#8597;</span>' });
      }))]);
      draw();
      document.getElementById('table-mount').appendChild(el('div', { class: 'table-wrap' }, [el('table', { class: 'compare' }, [thead, tbody])]));
    })();
  </script>
</body>
</html>
