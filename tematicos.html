<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artigos Temáticos — Profecias</title>
  <meta name="description" content="Estudos temáticos que atravessam vários capítulos.">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/print.css">
</head>
<body>
  <header id="site-header"></header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-head" id="theme-head"></div>
        <div class="card-grid" id="theme-grid"></div>
        <div id="empty-msg"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="data/books.js"></script>
  <script src="data/search-index.js"></script>
  <script src="data/search-index.en.js"></script>
  <script src="data/search-index.es.js"></script>
  <script src="data/search-index.ja.js"></script>
  <script src="data/icons.js"></script>
  <script src="data/i18n.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    (function () {
      var APOC = window.APOC, el = APOC.ui.el, getParam = APOC.ui.getParam;
      var book = getParam('livro') || 'apocalipse';
      var bk = APOC.bookBySlug(book) || APOC.bookBySlug('apocalipse');
      book = bk.slug;
      var bookName = APOC.bookName(book);
      document.title = bookName + ' — ' + APOC.t('site_title');

      var head = document.getElementById('theme-head');
      head.appendChild(el('p', { class: 'eyebrow', text: APOC.t('themes_eyebrow') }));
      head.appendChild(el('h2', {}, [el('span', { class: 'card-ico', text: '💡' }), document.createTextNode(' ' + APOC.t('themes_head', { book: bookName }))]));
      head.appendChild(el('p', { text: APOC.t('themes_desc') }));

      var grid = document.getElementById('theme-grid');
      var themes = (APOC.getIndex ? APOC.getIndex() : (APOC.index || [])).filter(function (a) { return a.type === 'theme' && a.book === book; });
      if (!themes.length) {
        document.getElementById('empty-msg').appendChild(el('div', { class: 'notice', html: APOC.t('themes_empty', { book: bookName }) + ' <a href="capitulos.html?livro=' + book + '">' + APOC.t('grid_eyebrow') + '</a>.' }));
        return;
      }
      themes.forEach(function (t) {
        var ico = APOC.iconForTheme ? APOC.iconForTheme(book, t.slug) : '💡';
        var card = el('a', { class: 'card', href: 'tema.html?livro=' + book + '&slug=' + t.slug, style: 'text-decoration:none' }, [
          el('h3', {}, [el('span', { class: 'card-ico', text: ico }), document.createTextNode(' ' + t.title + ' →')]),
          el('p', { text: t.summary }),
          el('div', { class: 'tags' }, (t.tags || []).slice(0, 6).map(function (tag) {
            return el('span', { class: 'tag-chip', text: tag });
          }))
        ]);
        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
